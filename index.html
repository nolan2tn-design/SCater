<div class="max-w-5xl mx-auto p-6 bg-gray-100 min-h-screen">
  <h1 class="text-3xl font-bold text-center mb-1 text-blue-700">📚 MY TOOL</h1>
  <p class="text-center text-gray-600 mb-8">Cater｜勁</p>

  <!-- Tab 導航 -->
  <div class="flex flex-wrap border-b mb-6 gap-1 bg-white rounded-t-2xl">
    <button onclick="showTab(0)" class="tab-btn active">平日計畫</button>
    <button onclick="showTab(1)" class="tab-btn">假日計畫</button>
    <button onclick="showTab(2)" class="tab-btn">每日打卡</button>
    <button onclick="showTab(3)" class="tab-btn">進度總覽</button>
    <button onclick="showTab(4)" class="tab-btn">多元學習</button>
  </div>

  <!-- 平日計畫 -->
  <div id="tab0" class="tab-content">
    <h2 class="text-2xl font-bold mb-4">平日計畫</h2>
    <table class="w-full bg-white rounded-xl shadow overflow-hidden">
      <thead class="bg-blue-700 text-white">
        <tr><th class="p-3 text-left">時間</th><th class="p-3 text-left">任務</th><th class="p-3 w-24">完成</th></tr>
      </thead>
      <tbody id="daily-tasks" class="text-sm"></tbody>
    </table>
  </div>

  <!-- 假日計畫 -->
  <div id="tab1" class="tab-content hidden">
    <h2 class="text-2xl font-bold mb-4">假日計畫</h2>
    <table class="w-full bg-white rounded-xl shadow overflow-hidden">
      <thead class="bg-blue-700 text-white">
        <tr><th class="p-3 text-left">時間</th><th class="p-3 text-left">任務</th><th class="p-3 w-24">完成</th></tr>
      </thead>
      <tbody id="holiday-tasks" class="text-sm"></tbody>
    </table>
  </div>

  <!-- 每日打卡 -->
  <div id="tab2" class="tab-content hidden">
    <h2 class="text-2xl font-bold mb-4">每日打卡紀錄</h2>
    <div class="bg-white p-6 rounded-2xl shadow">
      <h3 class="font-semibold mb-4">今天打卡 - <span id="today-date" class="text-blue-600"></span></h3>
      
      <div class="mb-4">
        <label class="block text-sm mb-1">整體完成度</label>
        <input id="today-percent" type="range" min="0" max="100" value="70" class="w-full accent-blue-600">
        <div class="text-center font-bold text-xl mt-1" id="percent-show">70%</div>
      </div>

      <textarea id="today-note" class="w-full h-28 p-4 border rounded-xl" placeholder="今天學了什麼？哪裡卡住了？有什麼心得..."></textarea>
      
      <button onclick="saveDailyCheckin()" class="mt-5 w-full py-4 bg-green-600 hover:bg-green-700 text-white font-bold rounded-2xl text-lg">
        ✅ 儲存今日打卡
      </button>
    </div>

    <h3 class="font-semibold mt-8 mb-3">歷史打卡紀錄</h3>
    <div id="history-list" class="space-y-4 max-h-96 overflow-auto pr-2"></div>
  </div>

  <!-- 進度總覽 & 多元學習（可之後再擴充） -->
  <div id="tab3" class="tab-content hidden">
    <h2 class="text-2xl font-bold mb-4">進度總覽</h2>
    <p class="text-gray-500">目前先用打卡功能追蹤，之後可再增加進度條</p>
  </div>

  <div id="tab4" class="tab-content hidden">
    <h2 class="text-2xl font-bold mb-4">多元學習</h2>
    <p class="text-gray-500">可在此記錄非虛構書籍、Podcast、勵志故事</p>
  </div>
</div>
